<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TinderSnap - AI Photo Generator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#fa3d63",
                        "background-light": "#f8f5f6",
                        "background-dark": "#000000",
                        "neutral-muted": "#98989a",
                        "surface-dark": "#1c1c1e"
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="flex items-center justify-between px-6 pt-6">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="camera">photo_camera</span>
<span class="text-xs font-semibold tracking-widest uppercase opacity-50">Step 1 of 4</span>
</div>
<button class="text-sm font-medium opacity-60 hover:opacity-100 transition-opacity">Skip</button>
</div>
<div class="flex w-full grow flex-col items-center justify-center p-6 @container">
<div class="relative mb-12 flex h-48 w-48 items-center justify-center rounded-3xl bg-gradient-to-br from-primary/20 to-primary/5 p-8 border border-primary/10">
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 mix-blend-overlay"></div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-[80px] text-primary" data-icon="local_fire_department">local_fire_department</span>
<div class="absolute -bottom-2 -right-2 flex h-16 w-16 items-center justify-center rounded-2xl bg-surface-dark border border-white/10 shadow-2xl">
<span class="material-symbols-outlined text-3xl text-primary" data-icon="auto_awesome">auto_awesome</span>
</div>
</div>
</div>
<div class="max-w-md space-y-4 text-center">
<h1 class="text-4xl font-bold tracking-tight text-slate-900 dark:text-slate-100 lg:text-5xl">
                    Welcome to TinderSnap
                </h1>
<p class="text-lg leading-relaxed text-neutral-muted px-4">
                    Create 6 high-quality Tinder photos from just 1 selfie with AI.
                </p>
</div>
<div class="mt-10 flex flex-row items-center justify-center gap-2">
<div class="h-1.5 w-8 rounded-full bg-primary"></div>
<div class="h-1.5 w-1.5 rounded-full bg-primary/20"></div>
<div class="h-1.5 w-1.5 rounded-full bg-primary/20"></div>
<div class="h-1.5 w-1.5 rounded-full bg-primary/20"></div>
</div>
</div>
<div class="p-6 pb-12 w-full max-w-md mx-auto">
<div class="mb-6 flex items-center justify-center gap-6 opacity-40">
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-xl" data-icon="verified">verified</span>
<span class="text-[10px] font-bold uppercase tracking-wider">AI Verified</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-xl" data-icon="bolt">bolt</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Instant Gen</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-xl" data-icon="shield">shield</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Privacy First</span>
</div>
</div>
<button class="flex h-16 w-full items-center justify-center rounded-xl bg-primary text-lg font-bold text-white shadow-lg shadow-primary/20 transition-transform active:scale-95">
                Get Started
                <span class="material-symbols-outlined ml-2" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="mt-6 text-center text-xs text-neutral-muted px-8 leading-tight">
                By continuing, you agree to our Terms of Service and Privacy Policy.
            </p>
</div>
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 -z-10 h-64 w-64 bg-primary/10 blur-[100px] rounded-full"></div>
</div>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</body></html>
