<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#fa3d63",
                        "background-light": "#f8f5f6",
                        "background-dark": "#000000",
                        "neutral-dark": "#1c1c1e",
                        "muted-text": "#636366"
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="flex items-center px-4 py-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100" style="font-size: 28px;">arrow_back_ios_new</span>
</button>
</header>
<main class="flex-1 flex flex-col px-6">
<div class="pt-4 pb-8">
<h1 class="text-3xl font-extrabold tracking-tight dark:text-white">Add your photo</h1>
</div>
<div class="flex-1 flex flex-col">
<div class="relative group cursor-pointer flex flex-col items-center justify-center border-2 border-dashed border-primary/30 dark:border-white/20 bg-primary/5 dark:bg-neutral-dark rounded-xl h-80 transition-all hover:border-primary/60 hover:bg-primary/10">
<div class="flex flex-col items-center gap-4">
<div class="w-16 h-16 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-size: 40px;">photo_camera</span>
</div>
<p class="text-lg font-semibold tracking-tight dark:text-slate-200">Take or choose from gallery</p>
</div>
<input accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
<div class="mt-6 flex flex-col items-center">
<p class="text-[14px] font-medium text-muted-text text-center max-w-xs leading-relaxed">
                    JPG/PNG, max 10MB. Face must be clearly visible.
                </p>
</div>
</div>
<div class="py-10">
<button class="w-full h-14 rounded-xl bg-primary/30 text-white/50 font-bold text-lg cursor-not-allowed flex items-center justify-center transition-all" disabled="">
                Continue
            </button>
</div>
</main>
<div class="px-6 pb-2 text-center">
<div class="inline-flex gap-1">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
</div>
</div>
</body></html>
